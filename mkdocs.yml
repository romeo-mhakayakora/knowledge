site_name: Knowledge
site_url: https://romeo-mhakayakora.github.io/knowledge/
repo_url: https://github.com/romeo-mhakayakora/knowledge
repo_name: romeo-mhakayakora/knowledge
docs_dir: content
site_dir: site

theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

plugins:
  - search
  - tags
  - awesome-pages
  - macros:
      j2_comment_start_string: "{%#"
      j2_comment_end_string: "#%}"
  - git-revision-date-localized:
      type: date
      enable_creation_date: true
  - social

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - javascripts/resizable-sidebars.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

hooks:
  - tools/mkdocs_hooks/wikilinks_backlinks.py
